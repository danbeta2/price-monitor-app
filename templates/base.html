<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Price Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <a href="/" class="sidebar-brand">
                    <i class="bi bi-floppy"></i>
                    <span>SCIMMIA.sys</span>
                </a>
            </div>
            
            <nav class="sidebar-nav">
                <a href="/" class="sidebar-link {% if request.endpoint == 'main.dashboard' %}active{% endif %}">
                    <i class="bi bi-speedometer2"></i>
                    <span>Dashboard</span>
                </a>
                <a href="/monitors" class="sidebar-link {% if request.endpoint == 'main.monitors' %}active{% endif %}">
                    <i class="bi bi-eye"></i>
                    <span>Monitor</span>
                </a>
                <a href="/products" class="sidebar-link {% if request.endpoint == 'main.products' %}active{% endif %}">
                    <i class="bi bi-box-seam"></i>
                    <span>Aggiungi Monitor</span>
                </a>
                
                <div class="sidebar-divider"></div>
                
                <a href="/settings" class="sidebar-link {% if request.endpoint == 'main.settings' %}active{% endif %}">
                    <i class="bi bi-gear"></i>
                    <span>Impostazioni</span>
                </a>
            </nav>
            
            <div class="sidebar-footer">
                <div class="connection-status">
                    <small class="text-muted">Connessioni</small>
                    <div class="status-dots">
                        <span class="status-dot {% if sources_configured is defined and sources_configured.google_shopping %}active{% endif %}" title="Google Shopping"></span>
                        <span class="status-dot {% if sources_configured is defined and sources_configured.ebay %}active{% endif %}" title="eBay"></span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="top-bar-left">
                    <button class="btn btn-link sidebar-toggle d-lg-none" type="button">
                        <i class="bi bi-list"></i>
                    </button>
                    <div class="breadcrumb-nav">
                        {% block breadcrumb %}
                        <span class="breadcrumb-item">{% block page_title %}Dashboard{% endblock %}</span>
                        {% endblock %}
                    </div>
                </div>
                <div class="top-bar-right">
                    {% block top_bar_right %}{% endblock %}
                </div>
            </header>

            <!-- Page Content -->
            <div class="page-content">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
